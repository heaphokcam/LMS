spring.application.name=loan-manangement-system

# IDE / gradlew: default is localhost. Start DB first: docker compose up postgres -d
# Docker: compose overrides via SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mydatabase
spring.docker.compose.enabled=false
# spring.datasource.url=jdbc:postgresql://postgres:5432/mydatabase
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA: use Flyway for schema, validate only
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT (use env JWT_SECRET in production)
jwt.secret=your-256-bit-secret-key-for-jwt-signing-change-in-production-minimum-32-chars
jwt.expiration-ms=86400000

# Springdoc / Swagger UI (avoid 500 on generic ApiResponse and JPA entity schema resolution)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.persist-authorization=true
springdoc.model-and-view-converter.enabled=false
springdoc.default-flat-param-object=true

# LoadData: default admin via AuthService.register (role id 4 = ADMIN)
app.load-data.enabled=true
app.load-data.admin.username=admin
app.load-data.admin.password=Admin123!
app.load-data.admin.email=admin@gmail.com
app.load-data.admin.role-id=4
